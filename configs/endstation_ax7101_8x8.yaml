#
# Software-defined Milan End-Station config (gaps attack item 4).
# Shape: AX7101 8x8 - the item-5 NxN test shape for the full end-station.
# 8 AAF listener + 8 AAF talker streams, 8ch each, TDM16 physical audio
# (16 channels per direction: the first two streams' worth are physical,
# the rest virtual per the wire-truth rule). VALIDATES today; streams 2..8
# and the TDM16 ser/des are marked "planned" (items 5 / 4-audio subtask).

schema: kebag-logic/milan-endstation-config
schema_version: "1.1.0"

entity:
  name: "Milan FPGA 8x8"
  entity_model_id: hash-derived      # EUI-64 from the model shape (recipe in
                                     # sw/builder/README-parameters.md); same
                                     # shape -> same id, shape change -> new
                                     # id. No pin: nothing flashed with this
                                     # shape yet.
  entity_id: mac-derived
  vendor_name: "Kebag Logic"
  firmware_version: "0.1.0"
  serial_number: "AX7101-0001"
  group_name: ""

board:
  target: ax7101
  constraints:
    sys_clk_hz: 100000000            # milan_soc.py default (sweep passes none)
    milan_clk_hz: 100000000          # single fast domain (AX timing CLOSED)
    l2_bytes: 32768                  # USER: 32K when space-bound
    phy: gmii-1g                     # RTL8211E GMII
    gtx_tx_invert: true              # PHY samples mid-bit (GMII-TX fix)
    floorplan: true
    flashboot: full
    uart_baudrate: 115200
    rx_queues: 2
    hs_page_bytes: 16384
    strip_probes: true
    eth_port: e2                     # e2 since 2026-07-22 (e1 GMII-RX
                                     # hardware fault, cold-soak-proven)

clocking:
  sampling_rate_hz: 48000
  audio_unit_rates_hz: [48000]       # honest advertisement: 48k render only
  media_clock_sources: [internal, input_stream, crf]
  default_source: internal
  crf_sink: true
  audio_pll_hz: 24576000             # TDM16 x 32-bit slots @48k -> BCLK 24.576M

audio_interface:
  kind: tdm16                        # 16 slots per direction
  word_length_bits: 24               # 24-in-32 slots
  cluster_mapping:
    policy: cap-at-interface         # clusters model real endpoints only:
                                     # per stream min(clusters, 16 TDM slots)

streams:
  listeners:
    - { name: "Stream In 0", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 1", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 2", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 3", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 4", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 5", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 6", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    - { name: "Stream In 7", channels: 8, formats: ["0x0205022002006000", "0x0215022002006000"] }
    # 0x0205022002006000 = AAF PCM32 48k 8ch; 0x0215... = ut-bit 1..8 family
    # clusters default = channels (8 mono clusters per stream port)
  talkers:
    # clusters = the single authority for the talker's cluster count; ships
    # WIRE TRUTH 2 (today's framer RTL is stereo - only 2 physical channels
    # exist behind any talker stream until the item-5 NxN talker lands;
    # raise together with that RTL). The legacy-8 layout stays expressible
    # (see endstation_arty_current.yaml).
    - { name: "Stream Out 0", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 1", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 2", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 3", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 4", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 5", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 6", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
    - { name: "Stream Out 7", channels: 8, clusters: 2, formats: ["0x0205022002006000"] }
