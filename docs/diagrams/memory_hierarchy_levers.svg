<text x="655.0" y="235.0" text-anchor="middle" font-size="11" fill="#666">~36 ns</text>
<rect x="380" y="280" width="380" height="68" rx="8" fill="#eaf5ee" stroke="#3fae6a" stroke-width="1.6"/>
<text x="570.0" y="319.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="570.0" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#155">REFILL ENGINE  ·  8 outstanding-miss slots</text>
<rect x="410" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="425.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">0</text>
<rect x="450" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="465.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">1</text>
<rect x="490" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="505.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">2</text>
<rect x="530" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="545.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">3</text>
<rect x="570" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="585.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">4</text>
<rect x="610" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="625.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">5</text>
<rect x="650" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="665.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">6</text>
<rect x="690" y="314" width="30" height="24" rx="3" fill="#cdebd7" stroke="#3fae6a" stroke-width="1"/>
<text x="705.0" y="331.0" text-anchor="middle" font-size="10" font-weight="700" fill="#123">7</text>
