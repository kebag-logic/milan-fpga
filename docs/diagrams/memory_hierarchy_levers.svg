<line x1="655" y1="248" x2="610" y2="278" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="380" y="384" width="380" height="54" rx="8" fill="#fdf3e7" stroke="#c98a1e" stroke-width="1.6"/>
<text x="570.0" y="409.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#123">Shared L2  64 KB</text>
<text x="570.0" y="424.0" text-anchor="middle" font-size="11" fill="#666">~178 ns   (both harts)</text>
<line x1="570.0" y1="346" x2="570.0" y2="382" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="380" y="468" width="380" height="44" rx="8" fill="#f6f0fa" stroke="#7a4fa3" stroke-width="1.6"/>
<text x="570.0" y="488.0" text-anchor="middle" font-size="12" font-weight="700" fill="#123">LiteDRAM L2  8 KB</text>
<text x="570.0" y="503.0" text-anchor="middle" font-size="11" fill="#666">controller cache</text>
<line x1="570.0" y1="440" x2="570.0" y2="466" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<rect x="380" y="540" width="380" height="52" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
<text x="570.0" y="564.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#7a1c12">DDR3-800  DRAM</text>
<text x="570.0" y="579.0" text-anchor="middle" font-size="11" fill="#666">~340 ns  (→ 1424 ns w/ TLB miss)   ← cold RX payload lives here</text>
<line x1="570.0" y1="514" x2="570.0" y2="538" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<text x="60" y="80" text-anchor="start" font-size="12" font-weight="700" fill="#888">LATENCY per access</text>
<text x="60" y="222" text-anchor="start" font-size="12.5" font-weight="400" fill="#444">L1  ~36 ns</text>
<line x1="180" y1="218" x2="374" y2="218" stroke="#eee" stroke-width="1"/>
<text x="60" y="410" text-anchor="start" font-size="12.5" font-weight="400" fill="#444">L2  ~178 ns</text>
<line x1="180" y1="406" x2="374" y2="406" stroke="#eee" stroke-width="1"/>
<text x="60" y="566" text-anchor="start" font-size="12.5" font-weight="400" fill="#444">DRAM 340–1424 ns</text>
<line x1="180" y1="562" x2="374" y2="562" stroke="#eee" stroke-width="1"/>
<text x="800" y="80" text-anchor="start" font-size="13" font-weight="700" fill="#111">THE THREE LEVERS</text>
<rect x="800" y="96" width="300" height="98" rx="8" fill="#f7fbf8" stroke="#3fae6a" stroke-width="1.6"/>
<text x="950.0" y="150.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="814" y="116" text-anchor="start" font-size="12.5" font-weight="700" fill="#155">1 · Non-blocking D$  (refill 1→8)</text>
<text x="814" y="136" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">• was 1 slot = BLOCKING</text>
<text x="814" y="152" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">• → 8 slots = up to 8 in flight (MLP)</text>
<text x="814" y="168" text-anchor="start" font-size="10.5" font-weight="700" fill="#c0392b">  BUT 0 gain ALONE (in-order core)</text>
<text x="814" y="184" text-anchor="start" font-size="10.5" font-weight="400" fill="#666">  — the slots need a FILLER</text>
<rect x="800" y="206" width="300" height="80" rx="8" fill="#eef5fb" stroke="#1f6fb2" stroke-width="1.6"/>
<text x="950.0" y="251.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="814" y="226" text-anchor="start" font-size="12.5" font-weight="700" fill="#124">2 · RPT hardware prefetcher</text>
<text x="814" y="246" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">• learns the stride, FILLS the slots</text>
<text x="814" y="262" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">• hides the payload cold read</text>
<text x="814" y="278" text-anchor="start" font-size="10.5" font-weight="700" fill="#c0392b">  → RX single  207 → 277  (+34%)</text>
<rect x="800" y="298" width="300" height="64" rx="8" fill="#fdf6ec" stroke="#c98a1e" stroke-width="1.6"/>
<text x="950.0" y="335.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="814" y="318" text-anchor="start" font-size="12.5" font-weight="700" fill="#634">3 · 64 KB L2  (capacity)</text>
<text x="814" y="338" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">• cuts the 2-hart capacity misses</text>
<text x="814" y="354" text-anchor="start" font-size="10.5" font-weight="700" fill="#c0392b">  → RX −P2  238 → 280</text>
<rect x="800" y="374" width="300" height="58" rx="8" fill="#eaf5ee" stroke="#2b7" stroke-width="1.6"/>
<text x="950.0" y="408.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="814" y="394" text-anchor="start" font-size="12.5" font-weight="700" fill="#063">mlp3 = all three combined</text>
<text x="814" y="414" text-anchor="start" font-size="10.5" font-weight="700" fill="#155">RX −P2 = 298 (best) · slots cost 0 BRAM</text>
<rect x="800" y="444" width="300" height="150" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
<text x="950.0" y="524.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="814" y="464" text-anchor="start" font-size="12.5" font-weight="700" fill="#7a1c12">NEXT LEVER · DDIO  (task #15)</text>
<text x="814" y="484" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">allocate-on-DMA-write: the RX writer</text>
<text x="814" y="500" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">lands the payload WARM in L2 / a stash</text>
<text x="814" y="516" text-anchor="start" font-size="10.5" font-weight="400" fill="#444">so copy_to_user hits cache, not DRAM</text>
<text x="814" y="532" text-anchor="start" font-size="10.5" font-weight="700" fill="#c0392b">→ removes the 51% cold-read wall</text>
<text x="814" y="548" text-anchor="start" font-size="10.5" font-weight="400" fill="#666">(the user's original 'network cache')</text>
<line x1="796" y1="540" x2="764" y2="556" stroke="#c0392b" stroke-width="2" marker-end="url(#arrR)"/>
</svg>