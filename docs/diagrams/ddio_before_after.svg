<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" font-family="DejaVu Sans, Arial, sans-serif">
<rect width="1180" height="520" fill="#ffffff"/>
<defs><marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555"/></marker><marker id="arrR" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#c0392b"/></marker></defs>
<text x="590.0" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#111">DDIO — the next RX lever: land the DMA payload WARM</text>
<text x="590.0" y="57" text-anchor="middle" font-size="13" fill="#666">the copy is 51% of RX CPU because it reads the payload COLD from DRAM; DDIO makes that read a cache HIT</text>
<rect x="50" y="84" width="520" height="396" rx="10" fill="#ffffff" stroke="#ddd" stroke-width="1.4"/>
<text x="310.0" y="287.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="310.0" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#c0392b">TODAY  —  cold copy  (mlp3)</text>
<rect x="90" y="140" width="200" height="60" rx="8" fill="#eef3f8" stroke="#33628f" stroke-width="1.6"/>
<text x="190.0" y="168.0" text-anchor="middle" font-size="13" font-weight="700" fill="#123">RX DMA writer</text>
<text x="190.0" y="183.0" text-anchor="middle" font-size="11" fill="#666">burst-writes payload</text>
<rect x="330" y="140" width="200" height="60" rx="8" fill="#fdf3e7" stroke="#c98a1e" stroke-width="1.6"/>
<text x="430.0" y="168.0" text-anchor="middle" font-size="13" font-weight="700" fill="#123">DDR3 DRAM</text>
<text x="430.0" y="183.0" text-anchor="middle" font-size="11" fill="#666">payload (cold)</text>
<line x1="290" y1="170" x2="326" y2="170" stroke="#555" stroke-width="2" marker-end="url(#arr)"/>
<text x="308" y="160" text-anchor="start" font-size="10" font-weight="400" fill="#888">write</text>
<rect x="90" y="300" width="200" height="60" rx="8" fill="#fdecea" stroke="#c0392b" stroke-width="2.2"/>
<text x="190.0" y="328.0" text-anchor="middle" font-size="13" font-weight="700" fill="#c0392b">copy_to_user</text>
<text x="190.0" y="343.0" text-anchor="middle" font-size="11" fill="#666">the recv copy</text>
<line x1="430" y1="200" x2="210" y2="296" stroke="#c0392b" stroke-width="2.4" marker-end="url(#arrR)"/>
<text x="320" y="258" text-anchor="start" font-size="12" font-weight="700" fill="#c0392b">COLD read</text>
<text x="320" y="274" text-anchor="start" font-size="11" font-weight="400" fill="#c0392b">~1424 ns / miss</text>
<rect x="90" y="398" width="440" height="54" rx="6" fill="#fdecea" stroke="#c0392b" stroke-width="1.6"/>
<text x="310.0" y="430.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#7a1c12">= 51% of RX −P2 CPU  →  RX −P2 = 298 Mbit/s</text>
<rect x="610" y="84" width="520" height="396" rx="10" fill="#ffffff" stroke="#ddd" stroke-width="1.4"/>
<text x="870.0" y="287.0" text-anchor="middle" font-size="14" font-weight="700" fill="#123"></text>
<text x="870.0" y="112" text-anchor="middle" font-size="15" font-weight="700" fill="#2b7d46">WITH DDIO  —  warm copy</text>
<rect x="650" y="140" width="200" height="60" rx="8" fill="#eef3f8" stroke="#33628f" stroke-width="1.6"/>
<text x="750.0" y="168.0" text-anchor="middle" font-size="13" font-weight="700" fill="#123">RX DMA writer</text>
<text x="750.0" y="183.0" text-anchor="middle" font-size="11" fill="#666">allocate-on-write</text>
<rect x="890" y="140" width="200" height="60" rx="8" fill="#eaf5ee" stroke="#3fae6a" stroke-width="2.2"/>
<text x="990.0" y="168.0" text-anchor="middle" font-size="13" font-weight="700" fill="#155">L2 / stash</text>
<text x="990.0" y="183.0" text-anchor="middle" font-size="11" fill="#666">payload (WARM)</text>
<line x1="850" y1="170" x2="886" y2="170" stroke="#2b7" stroke-width="2.4" marker-end="url(#arr)"/>
<text x="860" y="160" text-anchor="start" font-size="10" font-weight="700" fill="#2b7">stash</text>
<rect x="890" y="300" width="200" height="60" rx="8" fill="#f6f0fa" stroke="#7a4fa3" stroke-width="1.6"/>
<text x="990.0" y="328.0" text-anchor="middle" font-size="12" font-weight="700" fill="#123">DDR3 DRAM</text>
<text x="990.0" y="343.0" text-anchor="middle" font-size="11" fill="#666">backing store</text>
<line x1="990" y1="200" x2="990" y2="296" stroke="#999" stroke-width="1.6" marker-end="url(#arr)" stroke-dasharray="4 4"/>
<text x="998" y="254" text-anchor="start" font-size="10" font-weight="400" fill="#999">backed by</text>
<rect x="650" y="300" width="200" height="60" rx="8" fill="#eef7f0" stroke="#3fae6a" stroke-width="1.6"/>
<text x="750.0" y="328.0" text-anchor="middle" font-size="13" font-weight="700" fill="#155">copy_to_user</text>
<text x="750.0" y="343.0" text-anchor="middle" font-size="11" fill="#666">the recv copy</text>
<line x1="886" y1="326" x2="854" y2="326" stroke="#2b7" stroke-width="2.4" marker-end="url(#arr)"/>
<text x="760" y="290" text-anchor="start" font-size="11" font-weight="700" fill="#2b7">WARM hit ~178 ns</text>
<rect x="650" y="398" width="440" height="54" rx="6" fill="#eaf5ee" stroke="#2b7" stroke-width="1.6"/>
<text x="870.0" y="430.0" text-anchor="middle" font-size="13.5" font-weight="700" fill="#063">copy now fast  →  toward the 481 ceiling  (+61%)</text>
<line x1="578" y1="280" x2="606" y2="280" stroke="#c0392b" stroke-width="3" marker-end="url(#arr)"/>
</svg>