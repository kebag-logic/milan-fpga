# SPDX-License-Identifier: (GPL-2.0 OR BSD-2-Clause)
# Device-tree binding for the Milan TSN NIC (kl,dma-ether). This is the normative
# DT contract between the HDL (docs/REGISTER_MAP.md), the driver (kl-eth), and the
# device tree (sw/dts/milan.dtsi). Requirements: docs/FR_NFR.md §2.11 (FR-DT-*).
%YAML 1.2
---
$id: http://kebag-logic.com/dt/kl,dma-ether.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Kebag Logic Milan TSN Ethernet NIC

maintainers:
  - hackerman-kl <hackerman-kl@kebag-logic.com>

properties:
  compatible:
    const: kl,dma-ether-0.9        # matches driver of_match + CSR VERSION (FR-DT-01)

  reg:
    minItems: 2
    items:
      - description: CSR window (milan_csr), 64 KB @ 0x43C0_0000
      - description: TX DMA register block
      - description: RX DMA register block
      - description: timestamp-metadata DMA register block

  reg-names:
    minItems: 2
    items: [csr, dma-tx, dma-rx, dma-ts]

  interrupts:
    description: tx-dma, rx-dma, ts-dma, csr (FR-DT-02)
    minItems: 1
    maxItems: 4

  interrupt-names:
    minItems: 1
    items: [tx-dma, rx-dma, ts-dma, csr]

  kl,txq-cnt:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: number of HW TX queues (= CAP.num_queues)
  kl,rxq-cnt:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: number of HW RX queues

  kl,shaped-queues:
    $ref: /schemas/types.yaml#/definitions/uint32-array
    description: >
      Indices of the queues that are 802.1Qav CBS-shaped. Only these carry SR
      traffic; all others are strict-priority (FR-DT-03). Reset policy is <0 1>
      (q0,q1), matching CBS_EN_RST. Σ idleSlope of shaped queues must stay ≤ 75%.

  kl,ptp:
    type: boolean
    description: present if a PTP hardware clock (0x500 CSRs) is exposed (FR-DT-06)
  kl,ptp-clock-hz:
    $ref: /schemas/types.yaml#/definitions/uint32
    description: PHC reference frequency (fixed, link-speed independent)

  phy-mode: true
  phy-handle: true
  phy-reset-gpios:
    maxItems: 1
  local-mac-address: true
  mac-address: true

  mdio:
    type: object

required:
  - compatible
  - reg
  - reg-names
  - interrupts
  - kl,txq-cnt
  - kl,rxq-cnt

additionalProperties: false

examples:
  - |
    ethernet@43c00000 {
        compatible = "kl,dma-ether-0.9";
        reg = <0x43c00000 0x10000>, <0x40410000 0x10000>,
              <0x40410000 0x10000>, <0x40400000 0x10000>;
        reg-names = "csr", "dma-tx", "dma-rx", "dma-ts";
        interrupt-parent = <&plic>;
        interrupts = <1>, <2>, <3>, <4>;
        interrupt-names = "tx-dma", "rx-dma", "ts-dma", "csr";
        kl,txq-cnt = <4>;
        kl,rxq-cnt = <4>;
        kl,shaped-queues = <0 1>;
        phy-mode = "rgmii-id";
        phy-handle = <&phy0>;
        local-mac-address = [00 1b c5 00 00 01];
        mdio {
            #address-cells = <1>;
            #size-cells = <0>;
            phy0: ethernet-phy@1 { reg = <1>; };
        };
    };
