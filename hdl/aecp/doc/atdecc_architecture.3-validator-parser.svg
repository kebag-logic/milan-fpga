<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="680" viewBox="0 0 1260 680" font-family="Helvetica,Arial,sans-serif">
<rect width="1260" height="680" fill="#ffffff"/>
<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#333"/></marker><marker id="arro" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#999"/></marker></defs>
<rect x="40.0" y="12.0" width="1180.0" height="30.0" rx="0" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="630.0" y="31.9" font-size="14" fill="#222" text-anchor="middle">KL_aecp_packet_validator + KL_aecp_common_parser — AECPDU decode, bit-exact   (big-lane AXIS between them)</text>
<rect x="40.0" y="60.0" width="560.0" height="260.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="77.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">KL_aecp_packet_validator</text>
<rect x="60.0" y="92.0" width="520.0" height="90.0" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.3"/>
<text x="68.0" y="121.0" font-size="10" fill="#222" text-anchor="start">Gate in front of the parser: decodes the FIRST beat only, then forwards or</text>
<text x="68.0" y="134.0" font-size="10" fill="#222" text-anchor="start">eats the whole frame. Reads its own outputs via local mirrors (s_tready_l /</text>
<text x="68.0" y="147.0" font-size="10" fill="#222" text-anchor="start">m_tvalid_l) — modport read-back is what sv2v renders as top-absolute</text>
<text x="68.0" y="160.0" font-size="10" fill="#222" text-anchor="start">hierarchical paths (the Yosys portability-gate trap, fixed 2026-07-12).</text>
<rect x="60.0" y="195.0" width="520.0" height="99.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="222.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">FIRST_BEAT_S  beat0 visible: message_type in {0,6} AND cdl &gt;= 12 ?</text>
<text x="68.0" y="235.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">                yes -&gt; PASS_S  (forward all beats, tready=downstream)</text>
<text x="68.0" y="248.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">                no  -&gt; DROP_S  (tready=1, downstream tvalid never set)</text>
<text x="68.0" y="261.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">PASS_S/DROP_S -&gt; FIRST_BEAT_S after tlast</text>
<text x="68.0" y="274.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">sideband: valid_o / drop_o / status_o[4:0] / msgtype_o[3:0]</text>
<rect x="620.0" y="60.0" width="600.0" height="260.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="628.0" y="77.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">AECPDU on the parser bus — beat/byte map (big lane)</text>
<rect x="640.0" y="92.0" width="560.0" height="184.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="648.0" y="129.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">        lane7(63:56) ......................................... lane0</text>
<text x="648.0" y="142.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">beat0   subtype:FB | sv/mt | st/cdl | cdl | target_entity_id[63:32]</text>
<text x="648.0" y="155.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">beat1   target_entity_id[31:0] | controller_entity_id[63:32]</text>
<text x="648.0" y="168.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">beat2   controller_entity_id[31:0] | seq_id[15:0] | u/cmd[15:0]</text>
<text x="648.0" y="181.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">beat3+  command-specific payload ... (builder captures in parallel)</text>
<text x="648.0" y="194.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace"></text>
<text x="648.0" y="207.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte1 = {sv[7], version[6:4], message_type[3:0]}  0=AEM_CMD 6=VU_CMD</text>
<text x="648.0" y="220.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte2 = {status[4:0], cdl[10:8]}    byte3 = cdl[7:0]  (CDL = len-26)</text>
<text x="648.0" y="233.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">u/cmd = {u[15], command_type[14:0]}</text>
<text x="648.0" y="246.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">VU: NO u/command_type — protocol_id(6B) 00:1B:C5:0A:C1:00 at 22-27</text>
<rect x="40.0" y="340.0" width="1180.0" height="300.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="357.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">KL_aecp_common_parser</text>
<rect x="60.0" y="372.0" width="560.0" height="120.0" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.3"/>
<text x="68.0" y="403.0" font-size="10" fill="#222" text-anchor="start">The first accepted beat IS beat0 — no dead IDLE hop. (The original IDLE_S</text>
<text x="68.0" y="416.0" font-size="10" fill="#222" text-anchor="start">consumed beat0 uncaptured; every field landed one beat late and target_eid</text>
<text x="68.0" y="429.0" font-size="10" fill="#222" text-anchor="start">took the controller&#x27;s id. Root-caused in sim 2026-07-11.)</text>
<text x="68.0" y="442.0" font-size="10" fill="#222" text-anchor="start"></text>
<text x="68.0" y="455.0" font-size="10" fill="#222" text-anchor="start">Fields land in aecp_hdr_t as beats arrive; hdr_o.hdr_valid pulses at beat2</text>
<text x="68.0" y="468.0" font-size="10" fill="#222" text-anchor="start">when target_entity_id == entity_id_i; otherwise the frame drains silently.</text>
<rect x="60.0" y="507.0" width="560.0" height="65.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="530.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">BEAT0_S -&gt; BEAT1_S -&gt; BEAT2_S -&gt; BEAT3_S -&gt; PAYLOAD_S -&gt; BEAT0_S</text>
<text x="68.0" y="543.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">(PAYLOAD_S drains transparently; undefined state -&gt; BEAT0_S + $error</text>
<text x="68.0" y="556.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace"> [ifndef SYNTHESIS])</text>
<rect x="650.0" y="372.0" width="550.0" height="22.0" rx="0" fill="#e8e8e8" stroke="#666666" stroke-width="1.3"/>
<text x="925.0" y="386.85" font-size="11" fill="#222" text-anchor="middle">parsed header (to l0_state + builder)</text>
<rect x="650.0" y="394.0" width="550.0" height="184.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="658.0" y="431.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">aecp_hdr_t {</text>
<text x="658.0" y="444.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  message_type[3:0]        0 AEM_COMMAND / 6 VU_COMMAND</text>
<text x="658.0" y="457.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  status[4:0]              command: always 0</text>
<text x="658.0" y="470.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  control_data_length[10:0]</text>
<text x="658.0" y="483.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  target_entity_id[63:0]       == our entity_id (gate)</text>
<text x="658.0" y="496.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  controller_entity_id[63:0]   echoed into the response</text>
<text x="658.0" y="509.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  sequence_id[15:0]            echoed into the response</text>
<text x="658.0" y="522.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  u_flag, command_type[14:0]</text>
<text x="658.0" y="535.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  hdr_valid                    1-cycle strobe at beat2</text>
<text x="658.0" y="548.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">}</text>
</svg>