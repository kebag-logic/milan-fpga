<text x="785.0" y="97.0" font-size="10" fill="#222" text-anchor="middle">→ RX DMA / CPU (kl-eth)  — the tap is a</text>
<text x="785.0" y="110.0" font-size="10" fill="#222" text-anchor="middle">copy</text>
<rect x="60.0" y="200.0" width="260.0" height="130.0" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.3"/>
<text x="68.0" y="216.5" font-size="10" fill="#222" text-anchor="start">KL_aecp_ingress   [p2]</text>
<text x="68.0" y="229.5" font-size="10" fill="#222" text-anchor="start"></text>
<text x="68.0" y="242.5" font-size="10" fill="#222" text-anchor="start">• MONITOR tap on rx_axis_to_dma (reads only,</text>
<text x="68.0" y="255.5" font-size="10" fill="#222" text-anchor="start">  never backpressures the NIC)</text>
<text x="68.0" y="268.5" font-size="10" fill="#222" text-anchor="start">• filter: AECP-for-us (dst=our MAC, 0xFB)</text>
<text x="68.0" y="281.5" font-size="10" fill="#222" text-anchor="start">  and ADP ENTITY_DISCOVER</text>
<text x="68.0" y="294.5" font-size="10" fill="#222" text-anchor="start">• store-and-forward, strip Eth hdr,</text>
<text x="68.0" y="307.5" font-size="10" fill="#222" text-anchor="start">  replay BIG-lane</text>
<text x="68.0" y="320.5" font-size="10" fill="#222" text-anchor="start">• capture controller src MAC</text>
<rect x="60.0" y="360.0" width="260.0" height="40.0" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.3"/>
<text x="190.0" y="377.0" font-size="10" fill="#222" text-anchor="middle">adp_discover_o  →  advertiser (discovery</text>
<text x="190.0" y="390.0" font-size="10" fill="#222" text-anchor="middle">response)</text>
<rect x="380.0" y="200.0" width="430.0" height="46.0" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.3"/>
<text x="388.0" y="226.85" font-size="11" fill="#222" text-anchor="start">KL_aecp_packet_validator   [p3] — drop bad message_type / CDL &lt; 12</text>
<rect x="380.0" y="270.0" width="430.0" height="56.0" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.3"/>
<text x="388.0" y="294.85" font-size="11" fill="#222" text-anchor="start">KL_aecp_common_parser   [p3] — extract aecp_hdr_t</text>
<text x="388.0" y="308.85" font-size="11" fill="#222" text-anchor="start">(target/controller EID, seq, command_type); entity_id match</text>
<rect x="380.0" y="350.0" width="200.0" height="90.0" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.3"/>
<text x="388.0" y="372.5" font-size="10" fill="#222" text-anchor="start">KL_aecp_l0_state   [p4]</text>
<text x="388.0" y="385.5" font-size="10" fill="#222" text-anchor="start"></text>
<text x="388.0" y="398.5" font-size="10" fill="#222" text-anchor="start">• LOCK_ENTITY (60 s timeout)</text>
<text x="388.0" y="411.5" font-size="10" fill="#222" text-anchor="start">• ACQUIRE → NOT_SUPPORTED</text>
<text x="388.0" y="424.5" font-size="10" fill="#222" text-anchor="start">• current_configuration</text>
<rect x="600.0" y="350.0" width="210.0" height="44.0" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.3"/>
<text x="608.0" y="369.0" font-size="10" fill="#222" text-anchor="start">KL_aecp_timers   [p4]</text>
<text x="608.0" y="382.0" font-size="10" fill="#222" text-anchor="start">1 kHz tick → lock timer</text>
<rect x="380.0" y="470.0" width="430.0" height="130.0" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.3"/>
<text x="388.0" y="493.0" font-size="10" fill="#222" text-anchor="start">KL_aecp_response_builder   [p5]  — the command brain</text>
<text x="388.0" y="506.0" font-size="10" fill="#222" text-anchor="start"></text>
<text x="388.0" y="519.0" font-size="10" fill="#222" text-anchor="start">• capture payload, classify command</text>
<text x="388.0" y="532.0" font-size="10" fill="#222" text-anchor="start">• READ_DESCRIPTOR · GET/SET name·config·</text>
<text x="388.0" y="545.0" font-size="10" fill="#222" text-anchor="start">  sampling-rate·stream-format · GET_STREAM_INFO·</text>
<text x="388.0" y="558.0" font-size="10" fill="#222" text-anchor="start">  AVB_INFO · GET_COUNTERS · GET_AS_PATH · MVU</text>
<text x="388.0" y="571.0" font-size="10" fill="#222" text-anchor="start">  GET_MILAN_INFO · SET_* write-back</text>
<text x="388.0" y="584.0" font-size="10" fill="#222" text-anchor="start">• build response frame (little-lane, CDL = frame − 26)</text>
<rect x="620.0" y="620.0" width="190.0" height="40.0" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.3"/>
<text x="715.0" y="637.0" font-size="10" fill="#222" text-anchor="middle">KL_aecp_accessor   [p6]</text>
<text x="715.0" y="650.0" font-size="10" fill="#222" text-anchor="middle">(type,index) → base,len</text>
<rect x="620.0" y="668.0" width="190.0" height="40.0" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.3"/>
<text x="715.0" y="685.0" font-size="10" fill="#222" text-anchor="middle">KL_aecp_aem_store   [p6]</text>
<text x="715.0" y="698.0" font-size="10" fill="#222" text-anchor="middle">descriptor ROM + SET write-back</text>
<rect x="620.0" y="716.0" width="190.0" height="46.0" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.3"/>
<text x="715.0" y="729.5" font-size="10" fill="#222" text-anchor="middle">KL_aecp_aem_dyn_mux   [p6]</text>
<text x="715.0" y="742.5" font-size="10" fill="#222" text-anchor="middle">live-field overlay (entity_id,</text>
<text x="715.0" y="755.5" font-size="10" fill="#222" text-anchor="middle">MAC, caps, avail_index)</text>
<rect x="880.0" y="200.0" width="310.0" height="130.0" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.3"/>
<text x="888.0" y="229.5" font-size="10" fill="#222" text-anchor="start">adp_advertiser   [p7]</text>
<text x="888.0" y="242.5" font-size="10" fill="#222" text-anchor="start"></text>
<text x="888.0" y="255.5" font-size="10" fill="#222" text-anchor="start">• periodic ENTITY_AVAILABLE (valid_time)</text>
<text x="888.0" y="268.5" font-size="10" fill="#222" text-anchor="start">• answers ENTITY_DISCOVER (rcv_discover)</text>
<text x="888.0" y="281.5" font-size="10" fill="#222" text-anchor="start">• ENTITY_DEPARTING on link-down</text>
<text x="888.0" y="294.5" font-size="10" fill="#222" text-anchor="start">• available_index +1 on EVERY ADPDU sent</text>
<text x="888.0" y="307.5" font-size="10" fill="#222" text-anchor="start">  (la_avdecc/Hive strict-increment rule)</text>
<rect x="880.0" y="380.0" width="310.0" height="56.0" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.3"/>
<text x="888.0" y="404.85" font-size="11" fill="#222" text-anchor="start">adp_tx_arbiter (low-rate merge)   [p8]</text>
<text x="888.0" y="418.85" font-size="11" fill="#222" text-anchor="start">ADP advertise  +  AECP response</text>
<rect x="880.0" y="470.0" width="310.0" height="56.0" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="1.3"/>
<text x="888.0" y="494.85" font-size="11" fill="#222" text-anchor="start">adp_tx_arbiter (datapath merge)   [p8]</text>
<text x="888.0" y="508.85" font-size="11" fill="#222" text-anchor="start">control stream inserted in inter-frame gaps</text>
<rect x="880.0" y="560.0" width="310.0" height="40.0" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.3"/>
<text x="1035.0" y="583.85" font-size="11" fill="#222" text-anchor="middle">→ tx_axis_to_mac</text>
<rect x="60.0" y="840.0" width="180.0" height="44.0" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="150.0" y="852.5" font-size="10" fill="#222" text-anchor="middle">avdecc/</text>
<text x="150.0" y="865.5" font-size="10" fill="#222" text-anchor="middle">milan-v12-entity.json</text>
<text x="150.0" y="878.5" font-size="10" fill="#222" text-anchor="middle">(byte-accurate model)</text>
<rect x="270.0" y="840.0" width="150.0" height="44.0" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="345.0" y="859.0" font-size="10" fill="#222" text-anchor="middle">gen_aem_store.py</text>
<text x="345.0" y="872.0" font-size="10" fill="#222" text-anchor="middle">(trim → 5 descriptors)</text>
<rect x="450.0" y="840.0" width="160.0" height="44.0" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="530.0" y="852.5" font-size="10" fill="#222" text-anchor="middle">hdl/aecp/gen/</text>
<text x="530.0" y="865.5" font-size="10" fill="#222" text-anchor="middle">aecp_aem_rom.svh</text>
<text x="530.0" y="878.5" font-size="10" fill="#222" text-anchor="middle">(ROM+dir+overlay map)</text>
<rect x="60.0" y="905.0" width="550.0" height="70.0" rx="8" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="68.0" y="930.5" font-size="10" fill="#222" text-anchor="start">5 descriptors:  ENTITY → CONFIGURATION → { AVB_INTERFACE ×1 · AUDIO_UNIT ×1 · STREAM_OUTPUT ×1 }</text>
<text x="68.0" y="943.5" font-size="10" fill="#222" text-anchor="start">one configuration · 48/96/192 kHz · AAF talker.  Static fields in ROM; live fields overlaid at</text>
<text x="68.0" y="956.5" font-size="10" fill="#222" text-anchor="start">read.</text>
<rect x="660.0" y="840.0" width="210.0" height="60.0" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.3"/>
<text x="668.0" y="855.15" font-size="9" fill="#222" text-anchor="start">0x600 ADP/identity group</text>
<text x="668.0" y="867.15" font-size="9" fill="#222" text-anchor="start">entity_id · caps · station MAC ·</text>
<text x="668.0" y="879.15" font-size="9" fill="#222" text-anchor="start">gPTP GM/domain · valid_time</text>
<text x="668.0" y="891.15" font-size="9" fill="#222" text-anchor="start">(shared by ADP + AEM → can&#x27;t disagree)</text>
