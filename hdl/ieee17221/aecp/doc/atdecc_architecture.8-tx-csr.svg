<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="770" viewBox="0 0 1260 770" font-family="Helvetica,Arial,sans-serif">
<rect width="1260" height="770" fill="#ffffff"/>
<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#333"/></marker><marker id="arro" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#999"/></marker></defs>
<rect x="40.0" y="12.0" width="1180.0" height="30.0" rx="0" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="630.0" y="31.9" font-size="14" fill="#222" text-anchor="middle">TX merge + milan_csr — how control frames reach the wire, and the software contract   (hdl/common/csr/milan_csr.sv)</text>
<rect x="40.0" y="60.0" width="560.0" height="200.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="77.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">two-stage TX merge (adp_tx_arbiter x2)</text>
<rect x="60.0" y="92.0" width="520.0" height="116.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="121.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">stage 1 (low-rate): ADP advertiser vs AECP responses —</text>
<text x="68.0" y="134.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  frame-atomic round-robin, a started frame is never split</text>
<text x="68.0" y="147.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">stage 2 (datapath): control stream vs DMA TX stream —</text>
<text x="68.0" y="160.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  control frames inserted in inter-frame gaps only:</text>
<text x="68.0" y="173.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">  data keeps line rate, no mid-frame jitter</text>
<text x="68.0" y="186.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">both 64-bit little-lane AXIS into eth_mac_1g_rgmii</text>
<rect x="620.0" y="60.0" width="600.0" height="200.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="628.0" y="77.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">who validates what</text>
<rect x="640.0" y="92.0" width="560.0" height="133.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="648.0" y="123.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">tb/verilator/aecp       68 checks   unit/subsystem (all commands)</text>
<text x="648.0" y="136.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">tb/verilator/adp       121 checks   ADPDU byte-exact + index rule</text>
<text x="648.0" y="149.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">tb/verilator/milan_dp   17 checks   full datapath, NIC regression</text>
<text x="648.0" y="162.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">cosim tsn-gen &lt;-&gt; RTL   42 checks   independent frame builder</text>
<text x="648.0" y="175.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">milan_controller.py     24 checks   silicon over the AVB switch</text>
<text x="648.0" y="188.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">la_avdecc enum-probe    Hive&#x27;s library, strict enumeration</text>
<text x="648.0" y="201.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">yosys 19/19 + lint 10/10            device-portability gates</text>
<rect x="40.0" y="290.0" width="1180.0" height="440.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="307.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">CSR map — ADP/identity 0x600 + AECP status 0x648 (AXI-Lite, 32-bit)</text>
<rect x="60.0" y="322.0" width="1140.0" height="337.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="377.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x600 ADP_CTRL   [12:8] valid_time (2 s units)  [0] enable      reset 0x00001F00 (enable=0, vt=31)</text>
<text x="68.0" y="390.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x604 ADP_EIDLO  entity_id[31:0]                0x608 ADP_EIDHI  entity_id[63:32]</text>
<text x="68.0" y="403.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x60C ADP_MIDLO  entity_model_id[31:0]          0x610 ADP_MIDHI  entity_model_id[63:32]</text>
<text x="68.0" y="416.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x614 ADP_ECAPS  entity_capabilities — 0x8588; IDENTIFY_INDEX_VALID stays 0 (no CONTROL descriptor;</text>
<text x="68.0" y="429.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">                 advertising it is a la_avdecc compliance error, found+fixed 2026-07-11)</text>
<text x="68.0" y="442.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x618 ADP_TALK   {[31:16] talker_capabilities, [15:0] talker_stream_sources}    e.g. 0x48010008</text>
<text x="68.0" y="455.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x61C ADP_LIST   {[31:16] listener_capabilities, [15:0] listener_stream_sinks}</text>
<text x="68.0" y="468.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x620 ADP_CCAPS  controller_capabilities</text>
<text x="68.0" y="481.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x624 ADP_GMLO / 0x628 ADP_GMHI   gPTP grandmaster_id      0x62C ADP_DOMAIN [7:0] domain</text>
<text x="68.0" y="494.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x630 ADP_IDX0   {[31:16] identify_control_index, [15:0] current_configuration_index}</text>
<text x="68.0" y="507.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x634 ADP_IDX1   [15:0] interface_index</text>
<text x="68.0" y="520.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x638 ADP_ASLO / 0x63C ADP_ASHI   association_id</text>
<text x="68.0" y="533.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x640 ADP_CMD    W1S strobes, read 0:  [0] advertise-now (+bump)   [1] send DEPARTING</text>
<text x="68.0" y="546.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x644 ADP_STATUS RO: live available_index (advertiser counter)</text>
<text x="68.0" y="559.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x648 AECP_STAT0 RO: [16] locked   [15:0] cmd_count (accepted commands)</text>
<text x="68.0" y="572.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">0x64C AECP_STAT1 RO: [31:16] resp_count   [15:0] current_configuration</text>
<text x="68.0" y="585.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace"></text>
<text x="68.0" y="598.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">identity is programmed ONCE before setting ADP_CTRL[0]; ADP and AEM read the same wires, so the</text>
<text x="68.0" y="611.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">advertised ADPDU and READ_DESCRIPTOR(ENTITY) can never disagree.  Setup: avdecc/aecp_csr_setup.sh.</text>
</svg>