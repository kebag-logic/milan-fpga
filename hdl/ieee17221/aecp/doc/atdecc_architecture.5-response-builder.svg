<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="1000" viewBox="0 0 1260 1000" font-family="Helvetica,Arial,sans-serif">
<rect width="1260" height="1000" fill="#ffffff"/>
<defs><marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 z" fill="#333"/></marker><marker id="arro" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#999"/></marker></defs>
<rect x="40.0" y="12.0" width="1180.0" height="30.0" rx="0" fill="#f5f5f5" stroke="#666" stroke-width="1.3"/>
<text x="630.0" y="31.9" font-size="14" fill="#222" text-anchor="middle">KL_aecp_response_builder — command classify, segment engine, frame serialiser   (hdl/ieee17221/aecp/KL_aecp_response_builder.sv)</text>
<rect x="40.0" y="60.0" width="560.0" height="230.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="77.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">FSM (state_t)</text>
<rect x="60.0" y="92.0" width="520.0" height="167.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="127.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">IDLE_S       wait hdr_valid from the parser</text>
<text x="68.0" y="140.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">CAPTURE_S    payload -&gt; buf_r[0..63]  (u/cmd at buf[0..1],</text>
<text x="68.0" y="153.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">             command payload from buf[2])</text>
<text x="68.0" y="166.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">DECIDE_S     1 cycle: classify command_type; program &lt;=4 segments;</text>
<text x="68.0" y="179.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">             set status_q + cdl_q  (tables below)</text>
<text x="68.0" y="192.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">WRITE_S      SET_* only: buf_r[wb_src..] -&gt; store[wb_addr..]</text>
<text x="68.0" y="205.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">EMIT_ADDR_S  present store/const address (1-cycle store latency)</text>
<text x="68.0" y="218.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">EMIT_DATA_S  byte -&gt; little-lane beat packer (8 B/beat, pad to 60)</text>
<text x="68.0" y="231.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">CONCLUDE_S   resp_count++, pop the ingress req</text>
<rect x="620.0" y="60.0" width="600.0" height="230.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="628.0" y="77.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">segment engine — payload after byte 38</text>
<rect x="640.0" y="92.0" width="560.0" height="184.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="648.0" y="129.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">4 descriptors: {kind[1:0], addr[15:0], len[15:0]}</text>
<text x="648.0" y="142.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace"></text>
<text x="648.0" y="155.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">SEG_NONE   emit 0x00 x len         (zero-fill; counters block)</text>
<text x="648.0" y="168.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">SEG_ECHO   emit buf_r[addr..+len]  (echo command payload)</text>
<text x="648.0" y="181.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">SEG_STORE  emit store via dyn_mux  (descriptor/name bytes)</text>
<text x="648.0" y="194.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">SEG_CONST  emit const_q[addr..]    (fixed words, 64 B pool)</text>
<text x="648.0" y="207.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace"></text>
<text x="648.0" y="220.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">CDL = 12 + sum(seg_len) = frame_len - 26  (IEEE 1722-2016 5.4</text>
<text x="648.0" y="233.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">counts octets AFTER target_entity_id; tsn-gen&#x27;s frame-18</text>
<text x="648.0" y="246.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">CDL model is WRONG — do not use it as the CDL oracle)</text>
<rect x="40.0" y="310.0" width="1180.0" height="190.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="327.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">response frame — byte map (little lane out: tdata[7:0] = first wire byte)</text>
<rect x="60.0" y="342.0" width="1140.0" height="133.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="373.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte 0-5  dst = req_src_mac (ingress capture)   byte 18-25  target_entity_id = OUR entity_id</text>
<text x="68.0" y="386.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte 6-11 src = station_mac                     byte 26-33  controller_entity_id (echo)</text>
<text x="68.0" y="399.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte 12-13 0x22F0                               byte 34-35  sequence_id (echo)</text>
<text x="68.0" y="412.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte 14   0xFB                                  byte 36-37  {u, command_type} (echo)   [AEM]</text>
<text x="68.0" y="425.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte 15   {sv=0, ver=0, msg_type = command+1}               VU: protocol_id spans 36-41</text>
<text x="68.0" y="438.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">byte 16   {status[4:0], cdl[10:8]}   byte 17 cdl[7:0]       byte 38+  segments</text>
<text x="68.0" y="451.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">runt frames zero-padded to 60 B on the wire; CDL counts the unpadded length</text>
<rect x="40.0" y="520.0" width="1180.0" height="440.0" rx="8" fill="none" stroke="#999999" stroke-width="1.3" stroke-dasharray="6,4"/>
<text x="48.0" y="537.0" font-size="13" fill="#222" text-anchor="start" font-weight="bold">command programs (DECIDE_S) — segments and CDL, straight from the RTL</text>
<rect x="60.0" y="552.0" width="1140.0" height="354.0" rx="0" fill="#f5f5f5" stroke="#666666" stroke-width="1.3"/>
<text x="68.0" y="609.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">command                    status          payload segments (after the 12 echo-header octets)      CDL</text>
<text x="68.0" y="622.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">ENTITY_AVAILABLE 0x0002    SUCCESS         (none)                                                   12</text>
<text x="68.0" y="635.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">ACQUIRE 0x0000             NOT_SUPPORTED   ECHO flags+owner_id+type+idx (16 B)                      28</text>
<text x="68.0" y="648.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">LOCK 0x0001                grant/LOCKED    ECHO flags(4) + CONST owner_eid(8) + ECHO type+idx(4)    28</text>
<text x="68.0" y="661.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">READ_DESCRIPTOR 0x0004     SUCCESS         ECHO cfg+rsvd(4) + STORE desc[base .. base+len-1]        16+len</text>
<text x="68.0" y="674.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">READ_DESCRIPTOR (bad idx)  NO_SUCH_DESC    ECHO cfg+rsvd+type+idx (8 B)                          20</text>
<text x="68.0" y="687.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET/SET_CONFIGURATION      SUCCESS/BAD_ARG CONST rsvd(2) + current_config(2)                        16</text>
<text x="68.0" y="700.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET/SET_NAME 0x19/0x18     SUCCESS         ECHO type+idx+nameidx+cfg(8) + STORE name[wb_addr,64]    84</text>
<text x="68.0" y="713.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET/SET_SAMPLING_RATE      SUCCESS/BAD_ARG ECHO type+idx(4) + STORE rate@534(4)                     20</text>
<text x="68.0" y="726.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET/SET_STREAM_FORMAT      SUCCESS/BAD_ARG ECHO type+idx(4) + STORE fmt@628(8)                      24</text>
<text x="68.0" y="739.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET_STREAM_INFO 0x000F     SUCCESS         ECHO(4) + CONST 52 B (flags 0xF6000000, fmt, zeros)      68</text>
<text x="68.0" y="752.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">                                           Milan FIXED 56-byte payload — la_avdecc rejects short</text>
<text x="68.0" y="765.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET_AVB_INFO 0x0027        SUCCESS         ECHO(4) + CONST gm+delay+domain+flags+msrp_count (16)    32</text>
<text x="68.0" y="778.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET_AS_PATH 0x0028         SUCCESS         ECHO idx(2) + CONST count=1 + clock_id EUI64 (10)        24</text>
<text x="68.0" y="791.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">GET_COUNTERS 0x0029        SUCCESS         ECHO(4) + CONST valid(4) + NONE 128 B zero block        148</text>
<text x="68.0" y="804.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">                                           valid: STREAM_OUTPUT=0x1F, AVB_INTERFACE=0x23;</text>
<text x="68.0" y="817.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">                                           FULL 136 B payload on error statuses too</text>
<text x="68.0" y="830.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">REGISTER/DEREGISTER_UNSOL  SUCCESS         (none)                                                   12</text>
<text x="68.0" y="843.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">MVU GET_MILAN_INFO 0x0000  SUCCESS         CONST proto+cmd+rsvd + version=1 + features + cert=0     32</text>
<text x="68.0" y="856.0" font-size="10" fill="#222" text-anchor="start" font-family="Courier New,monospace">anything else              NOT_IMPLEMENTED ECHO the original payload                                echo</text>
</svg>